# =========================
# Spring Boot Application
# =========================
spring.application.name=HospitalReservation
server.port=${PORT:8081}

# =========================
# Database Configuration (Neon PostgreSQL)
# =========================
spring.datasource.url=jdbc:postgresql://ep-patient-band-anzbi3fp.c-6.us-east-1.aws.neon.tech:5432/neondb?sslmode=require
spring.datasource.username=neondb_owner
spring.datasource.password=npg_XmB9YjwyV4KP
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================
# Hikari Connection Pool
# =========================
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.validation-timeout=5000

# =========================
# Hibernate (JPA)
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.format_sql=true

# =========================
# Razorpay Configuration
# =========================
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}

# =========================
# Logging
# =========================
logging.level.org.springframework=INFO
logging.level.com.shirishkanoje=DEBUG

# =========================
# Misc
# =========================
spring.jmx.enabled=false
