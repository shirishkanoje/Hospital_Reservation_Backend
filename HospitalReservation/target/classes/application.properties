# =========================
# Spring Boot Application
# =========================
spring.application.name=${APP_NAME:HospitalReservation}
server.port=${SERVER_PORT:8081}

# =========================
# Database Configuration (MySQL)
# =========================
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:hospital_reservation}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:shirish}
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL:update}
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${FORMAT_SQL:true}

# =========================
# Thymeleaf (Optional if you use templates)
# =========================
spring.thymeleaf.cache=${THYMELEAF_CACHE:false}

# =========================
# Razorpay Configuration
# =========================
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_As5V0saQWOBFcT}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:zFPeQXPzDJWSc4D5VDtOQg1b}

# =========================
# Logging
# =========================
logging.level.org.springframework=${SPRING_LOG_LEVEL:INFO}
logging.level.com.shirishkanoje=${APP_LOG_LEVEL:DEBUG}

spring.jmx.enabled=${JMX_ENABLED:false}
